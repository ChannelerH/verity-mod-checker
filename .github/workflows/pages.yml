name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Prepare static artifact
        run: |
          mkdir _site
          cp index.html styles.css script.js favicon.svg robots.txt sitemap.xml feed.xml llms.txt llms-full.txt 04cb9707b196d4d8b34d0f083fb95f05.txt _site/
          cp -R ai-model api-connection-failed assets bedrock data download how-to-get-verity-mod how-to-talk-to-verity java not-working taken-down verity-exe voice-not-working what-happened what-is-verity-mod _site/
          touch _site/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Verify live Verity routes

on:
  schedule:
    - cron: "25 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Audit metadata, structured data, and internal targets
        run: node scripts/audit-site.mjs

  live-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check canonical pages and SEO files
        shell: bash
        run: |
          set -euo pipefail
          origin="https://veritymodchecker.online"
          paths=(
            "/"
            "/download/"
            "/what-is-verity-mod/"
            "/how-to-get-verity-mod/"
            "/java/"
            "/bedrock/"
            "/api-connection-failed/"
            "/how-to-talk-to-verity/"
            "/not-working/"
            "/sitemap.xml"
            "/robots.txt"
            "/feed.xml"
            "/data/verity-releases.json"
          )
          for path in "${paths[@]}"; do
            curl --fail --silent --show-error --location --retry 3 --max-time 30 "${origin}${path}" > /dev/null
          done

      - name: Validate route snapshot and canonical redirect
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error https://veritymodchecker.online/data/verity-releases.json \
            | jq -e '.projects | length == 3' > /dev/null
          checked_at="$(curl --fail --silent --show-error https://veritymodchecker.online/data/verity-releases.json | jq -r '.checkedAt')"
          checked_epoch="$(date --date="${checked_at}" +%s)"
          now_epoch="$(date +%s)"
          test "$((now_epoch - checked_epoch))" -lt 259200
          test "$(curl --silent --output /dev/null --write-out '%{redirect_url}' https://www.veritymodchecker.online/)" \
            = "https://veritymodchecker.online/"
          test "$(curl --silent --output /dev/null --write-out '%{redirect_url}' https://veritymodchecker.online/verity-je/)" \
            = "https://veritymodchecker.online/java/#versions"
          test "$(curl --silent --output /dev/null --write-out '%{redirect_url}' https://veritymodchecker.online/mcpe/)" \
            = "https://veritymodchecker.online/bedrock/#mcpe"
